# Server Configuration
server.port=8080
server.connection-timeout=20000
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.generate_statistics=false

# JWT Configuration
# It's recommended to store JWT secret in environment variables or external config for security
jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expiration=86400000

# Logging Configuration
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG