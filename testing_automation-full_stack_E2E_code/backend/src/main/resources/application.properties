# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password  # Consider using environment variables or secret management for production
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Note: JWT algorithm enforcement should be handled in application code using this secret
jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expiration=86400000  # Expiration time in milliseconds (24 hours)

# Logging Configuration
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG