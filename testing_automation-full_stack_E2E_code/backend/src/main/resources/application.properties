# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
# Set default timezone to UTC to avoid timezone conflicts
spring.datasource.hikari.data-source-properties.serverTimezone=UTC

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Uncomment and customize the following if Hibernate 2nd level cache is used for performance improvement
# spring.jpa.properties.hibernate.cache.use_second_level_cache=true
# spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# JWT Configuration
# Ensure the JWT secret key is securely managed, ideally via environment variables or secrets manager
jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expiration=86400000

# Logging Configuration
# Adjust logging levels appropriately for dev/test/prod environments
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG