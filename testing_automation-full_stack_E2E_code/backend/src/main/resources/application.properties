# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Use 'validate' to prevent unwanted schema changes in production; use 'update' only if safe and needed
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Set file encoding to UTF-8 (recommended for consistent behavior)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# JWT Configuration
# Note: JWT secret should be at least 512 bits (64 bytes) long for HS512 algorithm for security
jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expiration=86400000

# Logging configuration
# DEBUG level on your app package and Spring Security for detailed logs during development
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG