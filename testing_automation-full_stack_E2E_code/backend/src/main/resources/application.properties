# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP) Configuration for better performance and stability
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (use standardized property keys)
jwt.secret=myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expirationMs=86400000

# Logging Configuration
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG