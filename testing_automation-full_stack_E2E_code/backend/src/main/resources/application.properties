# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update  # Use with caution in production
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false  # Recommended to disable OpenEntityManagerInView for better session management

# JWT Configuration
jwt.secret=YOUR_SECURE_SECRET_KEY_HERE  # Use a secure, environment-specific secret key
jwt.expiration=86400000  # Expiration time in milliseconds (1 day)

# Logging
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG