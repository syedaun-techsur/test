# Server Configuration
server.port = 8080

# Database Configuration
# It's recommended to use environment variables or external config for sensitive info
spring.datasource.url = jdbc:postgresql://localhost:5432/auth_db?currentSchema=public&stringtype=unspecified&ssl=false&serverTimezone=UTC
spring.datasource.username = postgres
spring.datasource.password = password
spring.datasource.driver-class-name = org.postgresql.Driver

# Connection pool tuning (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size = 10
spring.datasource.hikari.minimum-idle = 5
spring.datasource.hikari.idle-timeout = 30000
spring.datasource.hikari.connection-timeout = 30000
spring.datasource.hikari.max-lifetime = 1800000

# JPA Configuration
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql = true

# JWT Configuration
# Keep JWT secret secure and random; consider externalizing the secret
jwt.secret = myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm
jwt.expiration-ms = 86400000

# Logging
logging.level.com.auth = DEBUG
logging.level.org.springframework.security = DEBUG