# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# It is highly recommended to externalize this secret and not hardcode it in the properties for security reasons
jwt.secret=${JWT_SECRET:ReplaceWithYourJWTSecretKey}
# Expiration time in milliseconds (1 day)
jwt.expiration=86400000

# Logging Configuration
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG

# Spring Security (example placeholders for better organization)
# spring.security.*=...