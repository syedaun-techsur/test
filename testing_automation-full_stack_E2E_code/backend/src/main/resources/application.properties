# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
# Recommended: Tune connection pool size for better performance
spring.datasource.hikari.maximum-pool-size=10

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# For security, load the secret from environment variable or secure vault in production
jwt.secret=${JWT_SECRET:myVeryLongSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast512BitsLongForHS512Algorithm}
jwt.expiration-ms=86400000

# Logging Configuration
logging.level.com.auth=DEBUG
logging.level.org.springframework.security=DEBUG