# Application general properties
spring.application.name=backend

# Server configuration
server.port=8080
server.servlet.context-path=/

# CORS configuration (typically overridden in backend code, but declare frontend origin whitelist here)
# Note: Proper CORS config usually in WebMvcConfigurer or bean
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.root=INFO

# Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# H2 console settings (if H2 used for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource (if needed for H2 in-memory testing in dev)
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect